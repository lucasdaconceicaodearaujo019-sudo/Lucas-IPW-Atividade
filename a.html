<h4 style="margin: 10px;">
            Agora, clique no botão.
           Cabra, conte de 1 a 10.
        </h4>

        <button onclick="contar()">Contar</button>

        <p id="resultadoContar"></p>

        <script>

            function contar() {

                let numeros = "";

                for (let i = 1; i <= 10; i++) {

                    numeros += i + "<br>";
                }

                document.getElementById("resultadoContar").innerHTML =
                    numeros;
            }

        </script>
